name: Link Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"
  pull_request:
  push:
    branches:
      - main

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md docs data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
