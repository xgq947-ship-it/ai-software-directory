metadata:
  name: AI Software Directory
  description: AI 软件、编程 Agent、本地模型运行工具、开放权重模型和必要基础工具下载入口。
  last_checked: 2026-06-29
  policy:
    - 只收官方入口、官方 GitHub、官方应用商店或可信官方文档。
    - 不上传安装包，不收第三方网盘，不收破解、不收镜像站。
    - 优先记录下载页和安装文档，不记录容易过期的安装包直链。

