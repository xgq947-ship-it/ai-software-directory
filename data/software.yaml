  - id: openai-codex-cli
    name: OpenAI Codex CLI
    category: ai-coding-agent
    vendor: openai
    status: active
    homepage: https://developers.openai.com/codex/cli
    download_page: https://developers.openai.com/codex/cli
    official_source: https://github.com/openai/codex
    install:
      macos_linux: curl -fsSL https://chatgpt.com/codex/install.sh | sh
      windows: powershell -ExecutionPolicy ByPass -c "irm https://chatgpt.com/codex/install.ps1 | iex"
      npm: npm install -g @openai/codex
      homebrew: brew install --cask codex
    platforms:
      - macOS
      - Linux
      - Windows
    pricing: depends-on-plan
    source_type: official
    tags:
      - coding-agent
      - terminal
      - openai
    last_checked: 2026-06-29
    notes: OpenAI 官方 CLI，安装命令以 OpenAI Developers 页面为准。

  - id: opencode
    name: OpenCode
    category: ai-coding-agent
    vendor: opencode
    status: active
    homepage: https://opencode.ai/
    download_page: https://opencode.ai/download
    official_source: https://github.com/opencode-ai/opencode
    install:
      terminal: curl -fsSL https://opencode.ai/install | bash
      npm: npm i -g opencode-ai
      bun: bun add -g opencode-ai
      homebrew: brew install anomalyco/tap/opencode
      desktop: brew install --cask opencode-desktop
    platforms:
      - macOS
      - Linux
      - Windows
      - VS Code
    pricing: freemium
    source_type: official
    tags:
      - coding-agent
      - open-source
      - terminal
      - desktop
    last_checked: 2026-06-29
