categories:
  - id: ai-chat-desktop
    name: AI 客户端
    description: 面向日常对话、搜索、写作和通用任务的官方桌面或移动客户端。

  - id: ai-coding-agent
    name: AI 编程 Agent
    description: 能读取项目、编辑代码、运行命令或辅助开发流程的 CLI、IDE 插件和 Agent。

  - id: ai-code-editor
    name: AI 代码编辑器
    description: 集成 AI 能力的编辑器或 IDE。

  - id: ai-agent-runtime
    name: AI Agent Runtime
    description: 面向长期任务、工具调用、记忆、自动化和多渠道接入的 Agent 系统。

  - id: android-automation
    name: Android 自动化
    description: 用于 Android 无障碍自动化、脚本运行、自动点击、任务执行和 APK 安装的工具。

  - id: ai-cli-manager
    name: AI CLI 管理工具
    description: 用于统一管理 AI 编程 CLI、模型供应商配置、本地路由、MCP、Skills 和用量统计的工具。

  - id: developer-terminal
    name: 开发终端
    description: 面向 AI 编程 Agent、并行任务、多会话和自动化开发工作流的终端工具。

  - id: local-llm-runtime
    name: 本地模型运行工具
    description: 用于在本机下载、管理、运行本地大模型的软件。

  - id: proxy-network
    name: 网络基础工具
    description: 用于开发环境网络访问、代理管理和跨平台网络配置的工具。

  - id: remote-access
    name: 远程控制
    description: 用于远程控制电脑、远程办公、远程协助、文件传输或游戏串流的软件。

  - id: screen-capture
    name: 截图贴图工具
    description: 用于截图、标注、贴图、取色、OCR 或视觉资料整理的工具。
